spring.application.name=wigell-travels

#Database
spring.datasource.url=jdbc:mysql://localhost:6606/wigell_travel_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.boot.admin.client.url=http://localhost:8081
spring.boot.admin.client.instance.service-base-url=http://localhost:8581
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true

logging.level.org.springframework.security=TRACE


server.port=8581

#Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/wigell-realm
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=wigell-realm
keycloak.admin.client-id=wigell-travels-admin
keycloak.admin.client-secret=SECRET


