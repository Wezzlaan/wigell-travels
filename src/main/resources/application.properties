spring.application.name=wigell-travels

#Database
spring.datasource.url=jdbc:mysql://localhost:6606/wigell_travel_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/wigell-travels

server.port=8581

#Keycloak
keycloak.admin.server-url=http://localhost:8081
keycloak.admin.realm=wigell-travels
keycloak.admin.client-id=wigell-travels-admin
keycloak.admin.client-secret=
